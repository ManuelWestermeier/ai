<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />

<title>Visitenkarten Generator</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
  body { font-family: Inter, sans-serif; background:#0b0b0f; color:#e5e7eb; }
  .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
</style>
</head>

<body class="p-6">

<div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">

  <!-- INPUT -->
  <div class="glass p-5 rounded-2xl space-y-3">
    <h1 class="text-xl font-semibold">Visitenkarten Generator</h1>

    <input id="token" placeholder="OpenRouter Token" class="w-full p-2 bg-black/40 rounded" />

    <input id="name" placeholder="Name" class="w-full p-2 bg-black/40 rounded" />
    <input id="tel" placeholder="Telefon" class="w-full p-2 bg-black/40 rounded" />
    <input id="email" placeholder="Email" class="w-full p-2 bg-black/40 rounded" />
    <input id="website" placeholder="Website" class="w-full p-2 bg-black/40 rounded" />
    <input id="ort" placeholder="Ort" class="w-full p-2 bg-black/40 rounded" />

    <textarea id="prompt" placeholder="Design Prompt" class="w-full p-2 bg-black/40 rounded"></textarea>

    <button onclick="generate()" class="w-full bg-white text-black p-2 rounded font-semibold">
      Generate
    </button>

    <div id="status" class="text-xs opacity-70"></div>
  </div>

  <!-- PREVIEW -->
  <div class="glass p-5 rounded-2xl">
    <h2 class="mb-3 font-semibold">Preview (85x55mm)</h2>

    <div class="flex justify-center">
      <iframe id="frame"
        style="width:850px;height:550px;border:0;transform:scale(0.65);transform-origin:top center;background:white;">
      </iframe>
    </div>

    <button onclick="download()" class="mt-4 w-full bg-gray-700 p-2 rounded">
      Screenshot
    </button>
  </div>

</div>

<script>

const keys = {
  token: "vc_token",
  name: "vc_name",
  tel: "vc_tel",
  email: "vc_email",
  website: "vc_website",
  ort: "vc_ort",
  prompt: "vc_prompt"
};

function saveAll() {
  localStorage.setItem(keys.token, token.value);
  localStorage.setItem(keys.name, name.value);
  localStorage.setItem(keys.tel, tel.value);
  localStorage.setItem(keys.email, email.value);
  localStorage.setItem(keys.website, website.value);
  localStorage.setItem(keys.ort, ort.value);
  localStorage.setItem(keys.prompt, prompt.value);
}

function loadAll() {
  token.value = localStorage.getItem(keys.token) || "";
  name.value = localStorage.getItem(keys.name) || "";
  tel.value = localStorage.getItem(keys.tel) || "";
  email.value = localStorage.getItem(keys.email) || "";
  website.value = localStorage.getItem(keys.website) || "";
  ort.value = localStorage.getItem(keys.ort) || "";
  prompt.value = localStorage.getItem(keys.prompt) || "";
}

/* ---------------- SYSTEM PROMPT ---------------- */

const SYSTEM_PROMPT = `
Senior Brand Designer.

Erstelle eine premium Visitenkarte.

FORMAT:
- 85x55mm (SVG viewBox 850x550)

DESIGN:
- minimal, high-end
- kein template look
- Swiss / Apple / Stripe style
- max 1 akzentfarbe
- klare typografie
- viel whitespace

OUTPUT STRICT JSON:
{
  "svg": "...",
  "reasoning": "...",
  "validation": "..."
}

VALIDATION:
- layout korrekt
- spacing sauber
- hierarchie klar
- 85x55 korrekt
`;

/* ---------------- MODEL FALLBACK CHAIN ---------------- */

const models = [
  "qwen/qwen3-coder:free",
  "openai/gpt-oss-20b",
  "google/gemma-3-27b",
  "z-ai/glm-4.5-air"
];

/* ---------------- STATE ---------------- */

let abortFlag = false;

/* ---------------- CORE FETCH ---------------- */

async function callModel(model, payload, token) {
  return await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({ ...payload, model })
  });
}

/* ---------------- RETRY ENGINE ---------------- */

async function generateWithRetry() {

  saveAll();

  abortFlag = false;

  const token = document.getElementById("token").value;

  const payload = {
    messages: [
      { role: "system", content: SYSTEM_PROMPT },
      { role: "user", content: JSON.stringify({
        name: name.value,
        tel: tel.value,
        email: email.value,
        website: website.value,
        ort: ort.value,
        design_prompt: prompt.value
      })}
    ]
  };

  let modelIndex = 0;
  let attempt = 0;

  while (!abortFlag) {

    const model = models[modelIndex];

    status.innerText = `model: ${model} | attempt: ${attempt}`;

    try {

      const res = await callModel(model, payload, token);

      /* RATE LIMIT HANDLING */
      if (res.status === 429) {
        status.innerText = `rate limit: ${model} -> retry in 5s`;
        await sleep(50);
        if (attempt % 10 === 9) await sleep(5000);
        attempt++;
        continue;
      }

      if (!res.ok) {
        throw new Error("HTTP " + res.status);
      }

      const data = await res.json();

      let raw = data?.choices?.[0]?.message?.content || "{}";

      let parsed;
      try { parsed = JSON.parse(raw); }
      catch {
        parsed = {
          svg: "<svg></svg>",
          reasoning: "parse_error",
          validation: "invalid_json"
        };
      }

      render(parsed);
      status.innerText = parsed.reasoning + " | " + parsed.validation;

      return;

    } catch (e) {

      status.innerText = `error: ${e.message} -> fallback`;

      /* fallback next model */
      modelIndex++;

      if (modelIndex >= models.length) {
        modelIndex = 0;
        attempt++;
      }

      /* infinite loop with delay */
      await sleep(5000);

      if (attempt >= 10) {
        status.innerText = "persistent failure loop (rate limit / provider down)";
      }
    }
  }
}

/* ---------------- RENDER ---------------- */

function render(parsed) {

  const doc = `
  <html>
  <body style="margin:0;background:white;display:flex;justify-content:center;align-items:center;height:100vh;">
    ${parsed.svg}
  </body>
  </html>`;

  frame.srcdoc = doc;
}

/* ---------------- UTILS ---------------- */

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

/* ---------------- PUBLIC ---------------- */

function generate() {
  generateWithRetry();
}

function download() {
  const frameDoc = frame.contentWindow.document.body;
  html2canvas(frameDoc).then(canvas => {
    const a = document.createElement("a");
    a.download = "card.png";
    a.href = canvas.toDataURL();
    a.click();
  });
}

/* ---------------- INIT ---------------- */

loadAll();

</script>

</body>
</html>
