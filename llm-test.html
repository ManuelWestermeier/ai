<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebGPU LLM Chat</title>

<style>
body { font-family: Arial; margin: 20px; }
#chat { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
.msg { margin: 5px 0; }
.user { color: blue; }
.bot { color: green; }
progress { width: 100%; }
</style>

</head>
<body>

<h2>LLM Chat (WebGPU)</h2>

<progress id="progress" value="0" max="100"></progress>
<div id="status">Init...</div>

<div id="chat"></div>

<input id="input" style="width:80%" placeholder="Message">
<button id="sendBtn">Send</button>

<script type="module">
import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

env.allowLocalModels = false;
env.allowRemoteModels = true;
env.remoteURL = "https://huggingface.co/";

let generator = null;
let ready = false;

const chat = document.getElementById("chat");
const status = document.getElementById("status");
const progress = document.getElementById("progress");
const input = document.getElementById("input");
const btn = document.getElementById("sendBtn");

function log(text, cls="bot") {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function load() {
    if (generator) return;

    status.textContent = "Downloading / caching model...";

    generator = await pipeline(
        "text-generation",
        "Xenova/distilgpt2",
        {
            device: "webgpu",
            progress_callback: (p) => {
                if (p.status === "progress") {
                    progress.value = Math.round(p.progress * 100);
                }
                status.textContent = p.status;
            }
        }
    );

    ready = true;
    status.textContent = "Ready";
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    log("You: " + text, "user");
    input.value = "";

    if (!ready) {
        log("Loading model...");
        await load();
    }

    const out = await generator(text, {
        max_new_tokens: 80,
        temperature: 0.7
    });

    log("Bot: " + out[0].generated_text, "bot");
}

// FIX: proper binding
btn.addEventListener("click", send);

// preload
load();
</script>

</body>
</html>
