<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebGPU Chat</title>
<style>
body { font-family: Arial; margin: 20px; }
#chat { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
.msg { margin: 5px 0; }
.user { color: blue; }
.bot { color: green; }
</style>
</head>
<body>

<h2>WebGPU Chat</h2>

<div id="status">Loading...</div>
<div id="chat"></div>

<input id="input" style="width:80%">
<button onclick="send()">Send</button>

<script type="module">
import { pipeline } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

let generator;

const chat = document.getElementById("chat");
const status = document.getElementById("status");

function log(text, cls="bot") {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
}

async function init() {
    generator = await pipeline(
        "text-generation",
        "Xenova/distilgpt2", // funktioniert im Browser
        {
            device: "webgpu"
        }
    );
    status.textContent = "Ready";
}

async function send() {
    const input = document.getElementById("input").value;
    if (!input) return;

    log("You: " + input, "user");

    const out = await generator(input, { max_new_tokens: 50 });
    log("Bot: " + out[0].generated_text, "bot");
}

init();
</script>

</body>
</html>
