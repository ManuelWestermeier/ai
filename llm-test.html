<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebGPU LLM Chat</title>
<style>
body { font-family: Arial; margin: 20px; }
#chat { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
.msg { margin: 5px 0; }
.user { color: blue; }
.bot { color: green; }
#status { margin: 10px 0; }
progress { width: 100%; }
</style>
</head>
<body>

<h2>Local LLM (WebGPU)</h2>

<progress id="progress" value="0" max="100"></progress>
<div id="status">Initializing...</div>

<div id="chat"></div>

<input id="input" style="width:80%" placeholder="Type message...">
<button onclick="send()">Send</button>

<script type="module">
import { pipeline, env } from "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2";

// Ensure correct CDN
env.allowLocalModels = false;
env.allowRemoteModels = true;
env.remoteURL = "https://huggingface.co/";

let generator = null;
let loading = false;

const progressEl = document.getElementById("progress");
const statusEl = document.getElementById("status");
const chatEl = document.getElementById("chat");

function log(text, cls="bot") {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
}

async function loadModel() {
    if (generator || loading) return;
    loading = true;

    statusEl.textContent = "Downloading model...";

    generator = await pipeline(
        "text-generation",
        "Xenova/distilgpt2",
        {
            device: "webgpu",
            progress_callback: (p) => {
                if (p.status === "progress") {
                    progressEl.value = Math.round(p.progress * 100);
                }
                statusEl.textContent = p.status;
            }
        }
    );

    statusEl.textContent = "Model ready (cached)";
}

async function send() {
    const inputEl = document.getElementById("input");
    const text = inputEl.value.trim();
    if (!text) return;

    log("You: " + text, "user");
    inputEl.value = "";

    if (!generator) {
        await loadModel();
    }

    log("Bot: ...");

    const output = await generator(text, {
        max_new_tokens: 80,
        temperature: 0.7,
        top_k: 50
    });

    chatEl.lastChild.textContent = "Bot: " + output[0].generated_text;
}

// Auto-load model
loadModel();
</script>

</body>
</html>
