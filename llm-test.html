<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebLLM Streaming Chat</title>

<style>
body { font-family: Arial; margin: 20px; }
#chat { height: 420px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
.msg { margin: 6px 0; white-space: pre-wrap; }
.user { color: #1a73e8; }
.bot { color: #188038; }
#status { margin: 10px 0; font-size: 14px; }
progress { width: 100%; }
</style>
</head>
<body>

<h3>Streaming WebLLM Chat</h3>

<div id="status">Init...</div>
<progress id="progress" value="0" max="100"></progress>

<div id="chat"></div>

<input id="input" style="width:80%" placeholder="Message">
<button id="sendBtn">Send</button>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

/* ---------------- IndexedDB ---------------- */

const DB = "llm-db";
const STORE = "kv";

function openDB() {
    return new Promise((res, rej) => {
        const req = indexedDB.open(DB, 1);
        req.onupgradeneeded = () => {
            req.result.createObjectStore(STORE);
        };
        req.onsuccess = () => res(req.result);
        req.onerror = () => rej(req.error);
    });
}

async function set(key, val) {
    const db = await openDB();
    return new Promise(r => {
        const tx = db.transaction(STORE, "readwrite");
        tx.objectStore(STORE).put(val, key);
        tx.oncomplete = r;
    });
}

async function get(key) {
    const db = await openDB();
    return new Promise(r => {
        const tx = db.transaction(STORE, "readonly");
        const req = tx.objectStore(STORE).get(key);
        req.onsuccess = () => r(req.result);
    });
}

/* ---------------- UI ---------------- */

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const statusEl = document.getElementById("status");
const progress = document.getElementById("progress");

function add(text, cls) {
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

/* ---------------- Model ---------------- */

let engine;
let modelId;

function pickModel() {
    const list = webllm.prebuiltAppConfig.model_list;

    return (
        list.find(m => m.model_id.includes("TinyLlama")) ||
        list.find(m => m.model_id.includes("Llama")) ||
        list[0]
    ).model_id;
}

async function init() {
    modelId = await get("modelId") || pickModel();

    statusEl.textContent = "Loading: " + modelId;

    engine = await webllm.CreateMLCEngine(modelId, {
        initProgressCallback: (p) => {
            if (p.progress !== undefined) {
                progress.value = Math.round(p.progress * 100);
            }
            statusEl.textContent = p.text || "loading...";
        }
    });

    await set("modelId", modelId);

    statusEl.textContent = "Ready";
}

/* ---------------- STREAM CHAT ---------------- */

async function send() {
    const text = input.value.trim();
    if (!text || !engine) return;

    input.value = "";
    add("You: " + text, "user");

    const botDiv = document.createElement("div");
    botDiv.className = "msg bot";
    chat.appendChild(botDiv);

    let full = "";

    const stream = await engine.chat.completions.create({
       messages: [
    {
        role: "system",
        content: "You are a precise assistant. Write professional, correct German. No hallucinations. No roleplay. No extra commentary."
    },
    {
        role: "user",
        content: text
    }
],
        temperature: 0.7,
        max_tokens: 200,
        stream: true
    });

    for await (const chunk of stream) {
        const token = chunk.choices[0]?.delta?.content || "";
        full += token;
        botDiv.textContent = "Bot: " + full;
        chat.scrollTop = chat.scrollHeight;
    }
}

document.getElementById("sendBtn").addEventListener("click", send);

init();

</script>

</body>
</html>
