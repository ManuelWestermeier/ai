<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebLLM Chat (WebGPU)</title>

<style>
body { font-family: Arial, sans-serif; margin: 20px; }
#chat { height: 420px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
.msg { margin: 6px 0; }
.user { color: #1a73e8; }
.bot { color: #188038; }
#status { margin: 8px 0; font-size: 14px; }
</style>

</head>
<body>

<h3>WebGPU Chat (WebLLM)</h3>

<div id="status">Initializing...</div>
<progress id="progress" value="0" max="100"></progress>

<div id="chat"></div>

<input id="input" style="width:80%" placeholder="Message">
<button id="sendBtn">Send</button>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const statusEl = document.getElementById("status");
const progressEl = document.getElementById("progress");
const sendBtn = document.getElementById("sendBtn");

function add(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

let engine = null;

async function init() {
    statusEl.textContent = "Loading model (first time download)...";

    engine = await webllm.CreateMLCEngine(
        "Llama-3.2-1B-Instruct-q4f32_1",
        {
            initProgressCallback: (p) => {
                if (p.progress !== undefined) {
                    progressEl.value = Math.round(p.progress * 100);
                }
                statusEl.textContent = p.text || p.stage || "loading...";
            }
        }
    );

    statusEl.textContent = "Ready (cached after first load)";
}

async function send() {
    const text = input.value.trim();
    if (!text || !engine) return;

    add("You: " + text, "user");
    input.value = "";

    const reply = await engine.chat.completions.create({
        messages: [
            { role: "user", content: text }
        ]
    });

    add("Bot: " + reply.choices[0].message.content, "bot");
}

sendBtn.addEventListener("click", send);

init();
</script>

</body>
</html>
