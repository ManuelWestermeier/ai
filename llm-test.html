<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebLLM Stable Chat</title>

<style>
body { font-family: Arial; margin: 20px; }
#chat { height: 420px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
.msg { margin: 6px 0; }
.user { color: #1a73e8; }
.bot { color: #188038; }
#status { margin: 8px 0; font-size: 14px; }
progress { width: 100%; }
</style>

</head>
<body>

<h3>WebLLM Chat (Auto Model Fix)</h3>

<div id="status">Init...</div>
<progress id="progress" value="0" max="100"></progress>

<div id="chat"></div>

<input id="input" style="width:80%" placeholder="Message">
<button id="sendBtn">Send</button>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const statusEl = document.getElementById("status");
const progressEl = document.getElementById("progress");
const sendBtn = document.getElementById("sendBtn");

function log(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

let engine = null;
let ready = false;
let modelId = null;

function pickModel() {
    const list = webllm.prebuiltAppConfig.model_list;

    // safest small model selection
    const preferred =
        list.find(m => m.model_id.includes("TinyLlama")) ||
        list.find(m => m.model_id.includes("phi")) ||
        list[0];

    return preferred.model_id;
}

async function init() {
    modelId = pickModel();

    statusEl.textContent = "Loading model: " + modelId;

    engine = await webllm.CreateMLCEngine(modelId, {
        initProgressCallback: (p) => {
            if (p.progress !== undefined) {
                progressEl.value = Math.round(p.progress * 100);
            }
            statusEl.textContent = p.text || p.stage || "loading...";
        }
    });

    ready = true;
    statusEl.textContent = "Ready (cached after first load)";
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    log("You: " + text, "user");
    input.value = "";

    if (!ready) {
        log("Model loading...");
        await init();
    }

    const res = await engine.chat.completions.create({
        messages: [
            { role: "user", content: text }
        ]
    });

    log("Bot: " + res.choices[0].message.content, "bot");
}

sendBtn.addEventListener("click", send);

// start immediately
init();

</script>

</body>
</html>
